<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculator</title>
</head>
<body>
    <style>
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f2f3f5;
            font-family: Arial, sans-serif;
        }
        .calculator{
            background-color: #000000;
            padding: 20px;
            border-radius: 15px;
            width: 280px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            
        }
        #display{
            width: 100%;
            height: 50px;
            margin-bottom: 15px;
            border: none;
            border-radius: 8px;
            background: #1e1e1e;
            color: #fff;
            font-size: 22px;
            padding: 2px;
            text-align: right;
        }
        .buttons{
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        button{
            height: 50px;
            border: none;
            border-radius: 8px;
            background-color: #555;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }
        button:hover{
            opacity: 0.85;
        }
        .operator{
            background-color: #ff9f0a;
        }
        .equal{
            background-color: #34c759;
            grid-column: span 1;
        }
        .clear{
            background-color: #ff3b30;
        }
        .del{
            background-color: #ff9500;
        }
        .zero{
            grid-column: span 2;
        }

    </style>
    <body>
        <div class="calculator">
            <input type="text" id="display" disabled>
            <div class="buttons">
                <button class="clear">C</button>
                <button class="del">DEL</button>
                <button class="operator">/</button>
                <button class="operator">*</button>
                <button>7</button>
                <button>8</button>
                <button>9</button>
                <button class="operator">-</button>
                <button>4</button>
                <button>5</button>
                <button>6</button>
                <button class="operator">+</button>
                <button>1</button>
                <button>2</button>
                <button>3</button>
                <button class="equal">=</button>
                <button class="zero">0</button>
                <button>.</button>
            </div>
        

<script>
    const display = document.getElementById("display");
    const buttons = document.querySelectorAll("button");

    let expression = "";

    buttons.forEach(button => {
        button.onclick = () => {
            let value = button.innerText;

            if (value === "C") {
                expression = "";
                display.value = "";
            } 
            else if (value === "DEL") {
                expression = expression.slice(0, -1);
                display.value = expression;
            } 
            else if (value === "=") {
                try {
                    expression = eval(expression).toString();
                    display.value = expression;
                } catch {
                    display.value = "Error";
                    expression = "";
                }
            } 
            else {
                expression += value;
                display.value = expression;
            }
        };
    });
</script>

</body>
</html>
